<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Validator</title>
    <!-- theme.css = společný vzhled obrazovek, pages/validator.css = úpravy jen pro tuto stránku. -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/pages/validator.css">
</head>
<body>
    <!-- Obrazovka validatoru. Zobrazuje aktuální zastávku, cíl a poslední vydanou jízdenku.
         Hodnoty doplňuje skript dist/stranky/validator.js z dat v localStorage. -->
    <div class="screen w3-card-4" role="region" aria-label="Validator displej">
        <!-- Hlavička s názvem zařízení a aktuálním časem. -->
        <div class="header">
            <div class="logo">VALIDATOR</div>
            <div id="aktualni-cas" class="time">—</div>
        </div>

        <div class="content">
            <!-- Aktuální poloha autobusu (přebírá se z panelu řidiče). -->
            <div class="label">Aktuální zastávka</div>
            <div class="stop" id="aktualni-zastavka-validator">Náměstí Svobody</div>

            <div class="label" style="margin-top: 12px;">Cíl cesty</div>
            <div class="dest" id="cil-cesty">Hlavní nádraží</div>

            <div style="height: 12px;"></div>

            <!-- Sekce s poslední vydanou jízdenkou - JavaScript ji zobrazí, až nějaká existuje. -->
            <div id="ticket-section">
                <div class="label ticket-nadpis">Vydaná jízdenka</div>

                <div class="ticket-udaje">
                    <div><strong>Trasa:</strong> <span id="ticket-from">-</span> → <span id="ticket-to">-</span></div>
                    <div><strong>Typ:</strong> <span id="ticket-type">-</span></div>
                    <!-- Doplňky (kolo, kufr...) se zobrazí jen tehdy, když nějaké jsou. -->
                    <div id="ticket-addons-container" style="display: none;">
                        <div><strong>Doplňky:</strong> <span id="ticket-addons">-</span></div>
                    </div>
                    <div style="margin-top: 8px;"><strong>Pásem:</strong> <span id="ticket-zones">-</span></div>
                </div>

                <div class="row ticket-cena-radek">
                    <div class="label ticket-cena-label">Cena</div>
                    <div class="price" id="ticket-price">-</div>
                </div>

                <div class="ticket-cas">
                    Čas vydání: <span id="ticket-time">-</span>
                </div>
            </div>

            <div class="row">
                <div class="label">Konečná cena</div>
                <div class="price">45 Kč</div>
            </div>
        </div>
    </div>

    <!-- Logika stránky je v TypeScriptu (src/stranky/validator.ts), zde se načítá zkompilovaná verze. -->
    <script type="module" src="../dist/stranky/validator.js"></script>
</body>
</html>
