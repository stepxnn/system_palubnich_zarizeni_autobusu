<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel řidiče</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/panel.css">
</head>
<body>
    <!-- Hlavní rozvržení panelu řidiče. CSS grid v panel.css rozdělí stránku na hlavičku, levý panel, seznam zastávek a pravý panel jízdenek. -->
    <div class="page">
        <!-- Horní lišta: datum, číslo linky, zpoždění a aktuální čas. Hodnoty času doplňuje skript z dist/panel-ridice.js. -->
        <header>
            <div class="header-left">
                <div id="date" class="date">&nbsp;</div>
                <div class="line-number">705</div>
            </div>

            <div class="header-center">
                <div id="delay" class="delay">+3 min</div>
            </div>

            <div class="header-right">
                <div id="time" class="time">--:--:--</div>
            </div>
        </header>

        <!-- Levý boční panel s ikonovými tlačítky pro rychlé funkce řidiče. -->
        <aside class="left">
            <button id="nastaveni-btn" class="w3-button icon-btn" aria-label="Nastavení" title="Nastavení">
                    <img class="left-icon" src="icons/nastaveni.png" alt="Nastavení">
                <span class="sr-only">Nastavení</span>
            </button>
            <button id="dispecink-btn" class="w3-button icon-btn" aria-label="Dispečink" title="Dispečink">
                    <img class="left-icon" src="icons/dispecink.png" alt="Dispečink">
                <span class="sr-only">Dispečink</span>
            </button>
            <button id="dalsi-zastavka-btn" class="w3-button icon-btn" aria-label="Další zastávka" title="Další zastávka">
                    <img class="left-icon" src="icons/dalsi-zastavka.png" alt="Další zastávka">
                <span class="sr-only">Další zastávka</span>
            </button>
            <button id="open-displej-btn" class="w3-button icon-btn" aria-label="Otevřít displej cestující" title="Otevřít displej cestující">
                <img class="left-icon" src="icons/displej-cestujici.png" alt="Displej cestující">
                <span class="sr-only">Displej cestující</span>
            </button>
            <button id="open-validator-btn" class="w3-button icon-btn" aria-label="Otevřít validator" title="Otevřít validator" style="margin-top:8px">
                <img class="left-icon" src="icons/validator.png" alt="Validator">
                <span class="sr-only">Validator</span>
            </button>
            <button id="odhlasit-btn" class="w3-button icon-btn" aria-label="Odhlásit" title="Odhlásit" style="margin-top:12px">
                <img class="left-icon" src="icons/odhlasit.png" alt="Odhlásit">
                <span class="sr-only">Odhlásit</span>
            </button>
        </aside>

        <!-- Střední část: seznam zastávek se nevypisuje ručně, ale vytvoří ho TypeScript podle dat linky. -->
        <section class="center">
            <h5>Zastávky</h5>
            <div id="vybrany-tah" style="margin-bottom: 15px; padding: 10px; background: #f0f0f0; border-radius: 5px; display: none;">
                <small style="color: #666;">Cesta:</small>
                <div style="font-size: 13px; margin-top: 5px;">
                    <span id="zastavka-od" style="font-weight: bold; color: #2196F3;">--</span>
                    <span style="margin: 0 5px;">→</span>
                    <span id="zastavka-kam" style="font-weight: bold; color: #2196F3;">--</span>
                </div>
                <div style="font-size: 12px; margin-top: 5px; color: #666;">
                    Pásem: <span id="pocet-pasem">0</span>
                </div>
            </div>
            <ul id="zastavkovy-list"></ul>
        </section>

        <!-- Pravá část: tlačítka pro výběr jízdného a doplňků. data-cena a data-nazev používá JavaScript pro výpočet ceny. -->
        <aside class="right">
            <div class="ticket">
                <h5>Jízdenky</h5>
                <div class="ticket-row">
                    <button id="dospeli" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="40" data-nazev="Dospělý">Dospělí</button>
                    <button id="senior" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="20" data-nazev="Senior 65+">Senior 65+</button>
                </div>
                <div class="ticket-row">
                    <button id="student" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="20" data-nazev="Student 18-26">Student</button>
                    <button id="junior" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="20" data-nazev="Junior 15-18">Junior 15-18</button>
                </div>
                <div class="ticket-row">
                    <button id="dite6-14" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="20" data-nazev="Dítě 6-14">Dítě 6-14</button>
                    <button id="dite" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="0" data-nazev="Dítě do 6 let">Dítě do 6 let</button>
                </div>
            </div>

            <div class="ticket">
                <h5>Zvláštní jízdné</h5>
                <div class="ticket-row">
                    <button id="ztp-p" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="0" data-nazev="ZTP/P (Průvodce zdarma)">ZTP/P</button>
                    <button id="ztp" class="w3-button half-btn w3-blue w3-large ticket-type-btn" data-cena="20" data-nazev="ZTP">ZTP</button>
                </div>
            </div>

            <div class="ticket">
                <h5>Zavazadla</h5>
                <div class="ticket-row">
                    <button id="kolo" class="w3-button half-btn w3-blue w3-large ticket-addon-btn" data-cena="20" data-nazev="Kolo">Kolo</button>
                    <button id="lyze" class="w3-button half-btn w3-blue w3-large ticket-addon-btn" data-cena="20" data-nazev="Lyže">Lyže</button>
                </div>
                <div class="ticket-row">
                    <button id="kufr" class="w3-button half-btn w3-blue w3-large ticket-addon-btn" data-cena="20" data-nazev="Kufr">Kufr</button>
                    <div class="half-spacer"></div>
                </div>
            </div>

            <div style="margin-top:10px">
                <button id="vydat-btn" class="w3-button w3-block w3-green w3-large">Vydat jízdenku</button>
                <button id="storno-btn" class="w3-button w3-block w3-red w3-large">Storno</button>
            </div>
        </aside>
    </div>

    <script>
        // Data o zastávkách a jejich pásmech (zdroj: data.ts)
        const zastavkyData = [
            { nazev: "Kutná Hora,aut.st.", pasmo: 7 },
            { nazev: "Kutná Hora,Žižkov,u hřbitova", pasmo: 7 },
            { nazev: "Miskovice,Hořany", pasmo: 6 },
            { nazev: "Červené Pečky,Čertovka", pasmo: 6 },
            { nazev: "Červené Pečky,Dolany", pasmo: 6 },
            { nazev: "Červené Pečky,škola", pasmo: 6 },
            { nazev: "Červené Pečky,nám.", pasmo: 6 },
            { nazev: "Červené Pečky,Amálka", pasmo: 6 },
            { nazev: "Červené Pečky,Dobešovice", pasmo: 6 },
            { nazev: "Červené Pečky,žel.st.", pasmo: 6 },
            { nazev: "Polepy", pasmo: 6 },
            { nazev: "Kolín,nemocnice", pasmo: 6 },
            { nazev: "Kolín,Bezovka", pasmo: 6 },
            { nazev: "Kolín,Družstevní dům", pasmo: 6 },
            { nazev: "Kolín,U Červených", pasmo: 6 },
            { nazev: "Kolín,nádraží", pasmo: 6 }
        ];

        // Ceník pro výpočet ceny jízdenek podle počtu pásem
        const cenik = [
            { pocetPasem: 1, cena: 12 },
            { pocetPasem: 2, cena: 24 },
            { pocetPasem: 3, cena: 36 },
            { pocetPasem: 4, cena: 48 },
            { pocetPasem: 5, cena: 60 },
            { pocetPasem: 6, cena: 72 },
            { pocetPasem: 7, cena: 84 },
            { pocetPasem: 8, cena: 96 },
            { pocetPasem: 9, cena: 108 },
            { pocetPasem: 10, cena: 120 },
        ];

        // Koeficienty slev pro jednotlivé typy jízdenek
        const koeficientyTypu = {
            'dospeli': 1.0,      // 100%
            'senior': 0.5,       // 50%
            'student': 0.5,      // 50%
            'junior': 0.5,       // 50%
            'dite6-14': 0.5,     // 50%
            'dite': 0.0,         // zdarma
            'ztp-p': 0.0,        // zdarma
            'ztp': 0.5           // 50%
        };

        // Inline skript řeší výběr jízdenek přímo na této stránce.
        // Druhý skript dole (type="module") řeší hlavní logiku panelu: zastávky, hodiny a displej.
        document.addEventListener('DOMContentLoaded', function(){
            // --- Původní navigace oken ---
            const validatorBtn = document.getElementById('open-validator-btn');
            if(validatorBtn){
                validatorBtn.onclick = function(){ window.open('validator.html','_blank'); };
            }

            const dispecBtn = document.getElementById('dispecink-btn');
            if(dispecBtn){
                dispecBtn.onclick = function(){ window.location.href = 'dispecer-komunikace.html'; };
            }

            // --- Logika výběru zastávek (odkud a kam) ---
            let zastavkaOd = null;   // Index prvé vybrané zastávky
            let zastavkaDo = null;   // Index druhé vybrané zastávky
            let pocetPasem = 0;      // Počet pásem mezi zastávkami

            // --- Logika odbavení jízdenek ---
            let vybranyTypJizdneho = null; // Může být jen jeden (např. Dospělý NEBO Student)
            let vybraneDoplnky = [];       // Může jich být víc (Kolo + Kufr)

            // querySelectorAll vybere všechny prvky podle CSS selektoru.
            // Tady si připravujeme skupiny tlačítek, aby se k nim daly hromadně připojit události.
            const typyTlacitka = document.querySelectorAll('.ticket-type-btn');
            const doplnkyTlacitka = document.querySelectorAll('.ticket-addon-btn');
            const vydatBtn = document.getElementById('vydat-btn');
            const stornoBtn = document.getElementById('storno-btn');

            // 1. Výběr hlavního typu jízdného (přepínač / radio button chování)
            typyTlacitka.forEach(btn => {
                btn.onclick = function() {
                    // Pokud klikneme na již vybrané, odškrtneme ho
                    if (vybranyTypJizdneho === this) {
                        this.classList.remove('w3-green');
                        this.classList.add('w3-blue');
                        vybranyTypJizdneho = null;
                    } else {
                        // Vynulujeme předchozí vybraný typ
                        typyTlacitka.forEach(b => {
                            b.classList.remove('w3-green');
                            b.classList.add('w3-blue');
                        });
                        // Aktivujeme nové tlačítko
                        this.classList.remove('w3-blue');
                        this.classList.add('w3-green');
                        vybranyTypJizdneho = this;
                    }
                };
            });

            // 2. Výběr zavazadel / doplňků (vícenásobný výběr / checkbox chování)
            doplnkyTlacitka.forEach(btn => {
                btn.onclick = function() {
                    const index = vybraneDoplnky.indexOf(this);
                    if (index > -1) {
                        // Už tam byl, tak ho odebereme
                        vybraneDoplnky.splice(index, 1);
                        this.classList.remove('w3-green');
                        this.classList.add('w3-blue');
                    } else {
                        // Přidáme do seznamu
                        vybraneDoplnky.push(this);
                        this.classList.remove('w3-blue');
                        this.classList.add('w3-green');
                    }
                };
            });

            // 3. Stornování celého výběru
            function resetOdbaveni() {
                vybranyTypJizdneho = null;
                vybraneDoplnky = [];
                zastavkaOd = null;
                zastavkaDo = null;
                pocetPasem = 0;
                // Všechna tlačítka zpět do modré
                document.querySelectorAll('.ticket-type-btn, .ticket-addon-btn').forEach(b => {
                    b.classList.remove('w3-green');
                    b.classList.add('w3-blue');
                });
                // Skrýt zobrazení vybrané cesty
                document.getElementById('zastavka-od').textContent = '--';
                document.getElementById('zastavka-kam').textContent = '--';
                document.getElementById('pocet-pasem').textContent = '0';
                zobrazVybranyTah();
            }

            if(stornoBtn) {
                stornoBtn.onclick = resetOdbaveni;
            }

            // --- Funkce pro výběr zastávek ---
            function vypocitejPocetPasem(indexOd, indexDo) {
                // Spočítá počet pásem mezi dvěma zastávkami
                // Vezme pasmo první zastávky, pak projde všechny zastávky až do druhé
                // a spočítá, kolik různých pásmen projde
                
                if (indexOd === null || indexDo === null) return 0;
                
                const start = Math.min(indexOd, indexDo);
                const end = Math.max(indexOd, indexDo);
                
                let pasmaSet = new Set();
                for (let i = start; i <= end; i++) {
                    if (zastavkyData[i]) {
                        pasmaSet.add(zastavkyData[i].pasmo);
                    }
                }
                
                // Počet pásem je počet unikátních pásmen, kterými projdeme
                return Math.max(1, pasmaSet.size);
            }

            function getCenaZaCenik(pocetPasem) {
                // Najde cenu v ceníku podle počtu pásem
                const cenikItem = cenik.find(item => item.pocetPasem === pocetPasem);
                return cenikItem ? cenikItem.cena : (pocetPasem * 12); // Fallback: 12 Kč za pásmo
            }

            function zobrazVybranyTah() {
                if (zastavkaOd !== null && zastavkaDo !== null) {
                    document.getElementById('vybrany-tah').style.display = 'block';
                } else {
                    document.getElementById('vybrany-tah').style.display = 'none';
                }
                
                // Aktualizuj vizuální označení zastávek
                const zastavkovyList = document.getElementById('zastavkovy-list');
                if (zastavkovyList) {
                    const buttons = Array.from(zastavkovyList.querySelectorAll('.stop-item, [data-zastavka-index]'));
                    buttons.forEach((btn, index) => {
                        btn.classList.remove('w3-blue', 'w3-light-green', 'w3-pale-green');
                        
                        if (index === zastavkaOd) {
                            // První vybraná zastávka - modrá
                            btn.classList.add('w3-blue');
                        } else if (index === zastavkaDo) {
                            // Druhá vybraná zastávka - zelená
                            btn.classList.add('w3-light-green');
                        }
                    });
                }
            }

            // Event listener na seznam zastávek
            const zastavkovyList = document.getElementById('zastavkovy-list');
            if (zastavkovyList) {
                zastavkovyList.addEventListener('click', function(e) {
                    const button = e.target.closest('.stop-item, [data-zastavka-index]');
                    if (!button) return;

                    // Zjistíme si index kliknuté zastávky
                    const buttons = Array.from(zastavkovyList.querySelectorAll('.stop-item, [data-zastavka-index]'));
                    const index = buttons.indexOf(button);
                    if (index === -1) return;

                    const zastavkaNazev = button.textContent.trim();

                    // Logika výběru: první klik = Od, druhý klik = Kam, třetí klik = resetuje a znovu Od
                    if (zastavkaOd === null) {
                        // Prvé kliknutí - nastaví "Od"
                        zastavkaOd = index;
                        zastavkaDo = null;
                        pocetPasem = 0;
                        document.getElementById('zastavka-od').textContent = zastavkaNazev;
                        document.getElementById('zastavka-kam').textContent = '--';
                        document.getElementById('pocet-pasem').textContent = '0';
                    } else if (zastavkaOd === index) {
                        // Kliknutí na stejnou zastávku - zrušit výběr
                        zastavkaOd = null;
                        zastavkaDo = null;
                        pocetPasem = 0;
                        document.getElementById('zastavka-od').textContent = '--';
                        document.getElementById('zastavka-kam').textContent = '--';
                        document.getElementById('pocet-pasem').textContent = '0';
                    } else if (zastavkaDo === null) {
                        // Druhé kliknutí - nastaví "Kam"
                        zastavkaDo = index;
                        pocetPasem = vypocitejPocetPasem(zastavkaOd, zastavkaDo);
                        document.getElementById('zastavka-kam').textContent = zastavkaNazev;
                        document.getElementById('pocet-pasem').textContent = pocetPasem.toString();
                    } else {
                        // Třetí a další kliknutí - resetuje a začíná znovu
                        zastavkaOd = index;
                        zastavkaDo = null;
                        pocetPasem = 0;
                        document.getElementById('zastavka-od').textContent = zastavkaNazev;
                        document.getElementById('zastavka-kam').textContent = '--';
                        document.getElementById('pocet-pasem').textContent = '0';
                    }

                    zobrazVybranyTah();
                });
            }

            // 4. Výdej jízdenky a výpočet ceny
            if(vydatBtn) {
                vydatBtn.onclick = function() {
                    // Kontrola: musí být vybrány obě zastávky
                    if (zastavkaOd === null || zastavkaDo === null) {
                        alert('Chyba: Musíte vybrat dvě zastávky (odkud a kam)!');
                        return;
                    }

                    // Kontrola: musí být vybrán alespoň typ jízdenky nebo zavazadlo
                    if (!vybranyTypJizdneho && vybraneDoplnky.length === 0) {
                        alert('Chyba: Nebyla vybrána žádná jízdenka ani zavazadlo!');
                        return;
                    }

                    let celkovaCena = 0;
                    let polozkyVypisu = [];

                    // Spočítáme cenu za jízdné (pokud je vybraný typ)
                    if (vybranyTypJizdneho) {
                        const typId = vybranyTypJizdneho.id;
                        const koeficient = koeficientyTypu[typId] !== undefined ? koeficientyTypu[typId] : 1.0;
                        const nazevTypu = vybranyTypJizdneho.getAttribute('data-nazev');
                        
                        const cenaZaCenik = getCenaZaCenik(pocetPasem);
                        const cenaTypu = Math.round(cenaZaCenik * koeficient);
                        
                        celkovaCena += cenaTypu;
                        polozkyVypisu.push(`${nazevTypu} (${pocetPasem} pásmem → ${cenaZaCenik} Kč × ${Math.round(koeficient*100)}% = ${cenaTypu} Kč)`);
                    }

                    // Připočteme zavazadla
                    vybraneDoplnky.forEach(btn => {
                        const cenaDoplnku = parseInt(btn.getAttribute('data-cena'));
                        const nazevDoplnku = btn.getAttribute('data-nazev');
                        celkovaCena += cenaDoplnku;
                        polozkyVypisu.push(`${nazevDoplnku} (${cenaDoplnku} Kč)`);
                    });

                    // Zobrazí trasu a výsledek
                    const zastavkaOdNazev = zastavkyData[zastavkaOd]?.nazev || '?';
                    const zastavkaDoNazev = zastavkyData[zastavkaDo]?.nazev || '?';

                    // Výsledný tisk / hlášení
                    alert(
                        `--- JÍZDENKA PID ---\n` +
                        `Trasa: ${zastavkaOdNazev} → ${zastavkaDoNazev}\n` +
                        `Počet pásem: ${pocetPasem}\n\n` +
                        `Položky:\n- ${polozkyVypisu.join('\n- ')}\n` +
                        `---------------------\n` +
                        `CELKEM K ÚHRADĚ: ${celkovaCena} Kč`
                    );

                    // Uloží vydanou jízdenku do localStorage pro synchronizaci s validatorem
                    const ticketData = {
                        zastavkaOd: zastavkaOdNazev,
                        zastavkaDo: zastavkaDoNazev,
                        pocetPasem: pocetPasem,
                        cena: celkovaCena,
                        typJizdneho: vybranyTypJizdneho ? vybranyTypJizdneho.getAttribute('data-nazev') : null,
                        doplnky: vybraneDoplnky.map(btn => btn.getAttribute('data-nazev')),
                        polozkyVypisu: polozkyVypisu,
                        cas: new Date().toLocaleTimeString('cs-CZ', {hour: '2-digit', minute: '2-digit', second: '2-digit'})
                    };
                    localStorage.setItem('currentTicket', JSON.stringify(ticketData));

                    // Zde pak můžeš v budoucnu zavolat např.: 
                    // tiskarna.vytiskni(celkovaCena, polozkyVypisu);

                    // Po úspěšném vydání vyčistíme palubní počítač pro dalšího cestujícího
                    resetOdbaveni();
                    zastavkaOd = null;
                    zastavkaDo = null;
                    pocetPasem = 0;
                    document.getElementById('zastavka-od').textContent = '--';
                    document.getElementById('zastavka-kam').textContent = '--';
                    document.getElementById('pocet-pasem').textContent = '0';
                    zobrazVybranyTah();
                };
            }
        });
    </script>
    <script type="module" src="../dist/panel-ridice.js"></script>
</body>
</html>
