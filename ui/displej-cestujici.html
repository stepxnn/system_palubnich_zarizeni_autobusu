<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displej pro cestující - PID Styl</title>
    <!-- theme.css = společné barvy a proměnné, pages/displej-cestujici.css = vzhled PID displeje. -->
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/pages/displej-cestujici.css">
</head>
<body>

    <!-- Samostatná obrazovka pro cestující. Data se čtou z localStorage, kam je ukládá panel řidiče. -->
    <div class="screen w3-card-4">
        <!-- Hlavička displeje: číslo linky a cílová zastávka. -->
        <header class="pid-header">
            <div id="cislo-linky">—</div>
            <div>
                <div id="cilovy-nazev">—</div>
            </div>
        </header>

        <!-- Hlavní část displeje: několik nejbližších zastávek (vykresluje JavaScript). -->
        <main class="pid-content">
            <ul id="seznam-zastavek"></ul>
            <div id="more-ind" class="more-indicator"></div>
        </main>

        <!-- Patička displeje: příští zastávka, tarifní pásma a aktuální čas. -->
        <footer class="pid-footer">
            <div class="footer-left w3-text-dark-grey">
                <div>Příští: <span id="aktualni-zastavka-val" class="w3-text-black">—</span></div>
                <ul id="seznam-pasem" style="display:flex; gap:8px; flex-wrap:wrap; padding:0; list-style:none; margin:0; font-size: 20px;"></ul>
            </div>

            <div class="footer-right">
                <span id="aktualni-cas">—</span>
            </div>
        </footer>

        <div class="sr-only">
            <!-- Skryté hodnoty pro případné testování nebo čtečky obrazovky. -->
            <span id="predpokladany-cas"></span>
            <span id="aktualni-pasmo"></span>
        </div>
    </div>

    <!-- Logika stránky je v TypeScriptu (src/stranky/displej-cestujici.ts), zde se načítá zkompilovaná verze. -->
    <script type="module" src="../dist/stranky/displej-cestujici.js"></script>
</body>
</html>
