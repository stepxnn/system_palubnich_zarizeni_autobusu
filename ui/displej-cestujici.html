<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displej pro cestující</title>
    
</head>
<body>
    <header>
        <h1>Displej pro cestující</h1>
    </header>

    <main>
        <section>
            <div>
                <div id="cislo-linky">—</div>
                <div>
                    <div>Cílová stanice</div>
                    <div id="cilovy-nazev">—</div>
                </div>
            </div>
        </section>

        <section id="upcoming-stops">
            <h2>Následující zastávky</h2>
            <ul id="seznam-zastavek"></ul>
            <div id="more-ind" class="more-indicator"></div>
        </section>

        <div class="bottom-bar">
            <div id="aktualni-zastavka-val">—</div>
            <div id="cas-a-pasmo">
                <div>Aktuální čas: <strong id="aktualni-cas">—</strong></div>
                <div>Předpoklad: <strong id="predpokladany-cas">—</strong></div>
                <div>Pásma: <strong id="aktualni-pasmo">—</strong></div>
            </div>
            <div>
                <h3>Seznam pásem</h3>
                <ul id="seznam-pasem" style="display:flex;gap:8px;flex-wrap:wrap;padding:0;list-style:none;margin:0"></ul>
            </div>
        </div>
    </main>

    <footer>
        <small>Displej</small>
    </footer>

    <script>
        // Helper: bezpečně nastaví text elementu
        function setText(id, value){
            const el = document.getElementById(id);
            if(el) el.textContent = (value !== undefined && value !== null) ? value : '—';
        }

        // Převod a vykreslení jednoduchého stavu do DOMu
        function renderState(state){
            if(!state) return;
            setText('cislo-linky', String(state.cisloLinky));

            // stops array
            const stops = state.seznamZastavek || [];
            // destination: take last stop if available
            const dest = stops.length ? stops[stops.length - 1] : '—';
            setText('cilovy-nazev', dest);

            // current stop
            setText('aktualni-zastavka-val', state.aktualniZastavka || '—');

            // upcoming stops: show up to 6 after current
            const list = document.getElementById('seznam-zastavek');
            const moreInd = document.getElementById('more-ind');
            if(list){
                list.innerHTML = '';
                const current = state.aktualniZastavka;
                let idx = 0;
                if(current && stops.length){ idx = stops.indexOf(current); if(idx < 0) idx = -1; }
                const start = Math.max(0, idx + 1);
                const MAX = 6;
                const slice = stops.slice(start, start + MAX);
                slice.forEach(s => { const li = document.createElement('li'); li.textContent = s; list.appendChild(li); });
                const remaining = Math.max(0, stops.length - (start + slice.length));
                if(moreInd){ if(remaining>0){ moreInd.style.display='block'; moreInd.textContent = `+ ${remaining} další`; } else { moreInd.style.display='none'; } }
                const displayCount = document.getElementById('display-count'); if(displayCount) displayCount.textContent = String(slice.length);
            }

            setText('aktualni-cas', state.aktualniCas ? new Date(state.aktualniCas).toLocaleTimeString('cs-CZ',{hour12:false}) : '—');
            setText('predpokladany-cas', state.predpokladanyCas ? new Date(state.predpokladanyCas).toLocaleTimeString('cs-CZ',{hour12:false}) : '—');
            setText('aktualni-pasmo', String(state.aktualniPasmo));

            const pasList = document.getElementById('seznam-pasem');
            if(pasList){ pasList.innerHTML=''; (state.seznamPasem||[]).forEach(p=>{ const li=document.createElement('li'); li.textContent=p; li.style.listStyle='none'; li.style.padding='6px 8px'; li.style.border='1px solid #eee'; li.style.borderRadius='6px'; li.style.marginRight='6px'; pasList.appendChild(li); }); }
        }

        // Při načtení okna načteme poslední uložený stav
        document.addEventListener('DOMContentLoaded', ()=>{
            const raw = localStorage.getItem('displejState');
            if(raw){ try{ renderState(JSON.parse(raw)); }catch(e){ console.warn('Neplatný stav displeje', e); } }
        });

        // Když jiná karta uloží nový stav, storage event nám to oznámí
        window.addEventListener('storage',(ev)=>{
            if(ev.key==='displejState'){
                try{ renderState(JSON.parse(ev.newValue)); }catch(e){ console.warn('Neplatný stav z storage', e); }
            }
        });
    </script>
</body>
</html>
