<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palubní počítač</title>
</head>
<body>
    <h1>Palubní počítač</h1>

    <section id="login-section">
        <h2>Přihlášení do systému</h2>
        <form id="login-form" novalidate>
            <div class="form-row">
                <label for="username">kód</label>
                <input id="username" name="username" type="text" placeholder="Zadejte kód" required autocomplete="username" />
            </div>

            <div class="form-row">
                <label for="password">Heslo</label>
                <input id="password" name="password" type="password" placeholder="Zadejte heslo" required autocomplete="current-password" />
            </div>

            <div class="form-row">
                <button id="login-btn" type="submit">Přihlásit</button>
            </div>
            <p id="error-msg" style="display:none; color:red;">Nesprávný kód nebo heslo</p>
        </form>
    </section>

    <script type="module" src="dist/index.js"></script>
</body>
</html>
